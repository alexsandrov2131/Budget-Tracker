# Project-wide Gradle settings.

# Включаем AndroidX — обязательно для androidx.appcompat, material и т.д.
android.useAndroidX=true

# Отключаем старую Support Library (Jetifier не нужен, если все зависимости уже AndroidX)
android.enableJetifier=false

# Увеличиваем память для демона Gradle
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Используем параллельную сборку модулей
org.gradle.parallel=true

# AndroidX зависимости используют Kotlin, но проект на Java — добавим на всякий случай
kotlin.code.style=official
